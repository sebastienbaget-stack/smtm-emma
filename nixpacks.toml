[phases.setup]
nixPkgs = [
  "chromium",
  "nss",
  "nspr",
  "atk",
  "cups",
  "dbus",
  "expat",
  "libdrm",
  "libxkbcommon",
  "mesa",
  "libX11",
  "libXcomposite",
  "libXdamage",
  "libXext",
  "libXfixes",
  "libXrandr",
  "gbm",
  "pango",
  "cairo",
  "alsa-lib"
]

[phases.build]
cmds = [
  "npm run build",
  "cd server && npx playwright install chromium --with-deps"
]

[start]
cmd = "npm start"

<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
  body { background:#0a0a0a; display:flex; flex-wrap:wrap; gap:32px; padding:40px; align-items:flex-end; font-family:monospace; }
  .box { display:flex; flex-direction:column; align-items:center; gap:8px; }
  .label { color:#555; font-size:11px; }
  .on-white { background:white; border-radius:8px; padding:8px; }
</style>
</head>
<body>

<!-- SVG inline partagé via <symbol> -->
<svg style="display:none" xmlns="http://www.w3.org/2000/svg">
  <symbol id="wolf" viewBox="0 0 100 100">

    <!-- Tête + crinière + mâchoire supérieure -->
    <path d="
      M 90,44
      C 86,38 80,30 72,24
      C 66,20 58,16 52,12
      L 50,4 L 44,16
      L 38,6  L 34,20
      L 26,8  L 24,24
      L 14,12 L 14,28
      L 6,18  L 8,36
      L 2,30  L 6,48
      L 2,44  L 6,60
      C 10,56 16,54 22,54
      C 30,54 42,54 54,52
      C 64,50 76,48 84,46
      Z
    "/>

    <!-- Mâchoire inférieure -->
    <path d="
      M 22,62
      C 18,68 16,76 18,84
      L 8,78 L 4,94
      L 14,86 L 16,96
      L 28,88 L 36,94
      C 38,86 46,80 56,76
      C 64,72 72,68 78,62
      C 68,60 56,60 44,62
      Z
    "/>

    <!-- Croc -->
    <polygon points="44,72 40,86 52,80"/>

    <!-- Œil blanc + pupille -->
    <ellipse cx="64" cy="28" rx="6.5" ry="5" fill="white"/>
    <ellipse cx="65" cy="28.5" rx="3" ry="2.8" fill="currentColor"/>
    <circle cx="63" cy="27" r="1.1" fill="white" opacity="0.7"/>

    <!-- Highlight museau -->
    <path d="M 82,36 C 88,40 92,46 90,54 C 86,52 82,48 80,44 Z" fill="white" opacity="0.85"/>

  </symbol>
</svg>

<div class="box">
  <svg width="16" height="16" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">16px</span>
</div>

<div class="box">
  <svg width="28" height="28" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">28px — header</span>
</div>

<div class="box">
  <svg width="56" height="56" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">56px</span>
</div>

<div class="box">
  <svg width="120" height="120" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">120px</span>
</div>

<div class="box">
  <svg width="200" height="200" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">200px</span>
</div>

<div class="box on-white">
  <svg width="96" height="96" style="color:#7c3aed;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label" style="color:#333">sur fond blanc</span>
</div>

<!-- variante rose -->
<div class="box">
  <svg width="96" height="96" style="color:#e879f9;fill:currentColor"><use href="#wolf"/></svg>
  <span class="label">variante rose</span>
</div>

</body>
</html>
